<!DOCTYPE html>
<html lang="vi" style="background:#0B0E14;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0B0E14">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="GTR">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>GTR — Chơi. Tạo. Kết nối.</title>
<style>html,body{background:#0B0E14;}</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"></noscript>
<style>
  :root{
    --void:#0B0E14;
    --panel:#12161F;
    --panel-2:#171C27;
    --line: rgba(237,241,247,0.08);
    --cloud:#EDF1F7;
    --muted:#8891A3;
    --signal:#2CF1B0;
    --signal-dim: rgba(44,241,176,0.14);
    --ember:#FF6B4A;
    --ember-dim: rgba(255,107,74,0.16);
    --violet:#8C7CFF;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--void);
    color:var(--cloud);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    overflow-x:hidden;
  }
  ::selection{ background:var(--signal); color:#06110D; }
  a{color:inherit; text-decoration:none;}
  ::-webkit-scrollbar{width:10px; height:10px;}
  ::-webkit-scrollbar-track{background:var(--void);}
  ::-webkit-scrollbar-thumb{background:#232936; border-radius:10px;}

  .display{ font-family:'Space Grotesk', sans-serif; }
  .mono{ font-family:'JetBrains Mono', monospace; }

  /* ===== Background texture ===== */
  .grid-glow{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 10%, transparent 70%);
    opacity:0.5;
  }

  /* ===== Top Nav ===== */
  header{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; gap:24px;
    padding:14px 28px;
    background:rgba(11,14,20,0.94);
    backdrop-filter: blur(6px);
    border-bottom:1px solid var(--line);
  }
  .logo{
    display:flex; align-items:center; gap:10px;
    font-family:'Space Grotesk'; font-weight:700; font-size:22px; letter-spacing:0.5px;
    flex-shrink:0;
  }
  .logo .mark{
    width:30px; height:30px;
    background: conic-gradient(from 210deg, var(--signal), var(--violet), var(--ember), var(--signal));
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display:grid; place-items:center;
    box-shadow: 0 0 18px rgba(44,241,176,0.35);
  }
  .logo .mark::after{
    content:""; width:12px; height:12px; background:var(--void);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  }

  .searchbar{
    flex:1; max-width:560px;
    display:flex; align-items:center; gap:10px;
    background:var(--panel-2); border:1px solid var(--line);
    border-radius:10px; padding:9px 14px;
    color:var(--muted);
    transition: border-color .2s;
  }
  .searchbar:focus-within{ border-color:var(--signal); }
  .searchbar input{
    background:none; border:none; outline:none; color:var(--cloud);
    font-family:'Inter'; font-size:14px; width:100%;
  }
  .searchbar input::placeholder{ color:#5B6577; }

  nav.primary{ display:flex; align-items:center; gap:6px; margin-left:auto; flex-shrink:0;}
  .icon-btn{
    width:38px; height:38px; border-radius:9px;
    display:grid; place-items:center;
    color:var(--muted);
    border:1px solid transparent;
    cursor:pointer;
    transition: all .15s;
    position:relative;
  }
  .icon-btn:hover{ background:var(--panel-2); color:var(--cloud); border-color:var(--line); }
  .badge-dot{
    position:absolute; top:6px; right:6px; width:7px; height:7px; border-radius:50%;
    background:var(--ember); box-shadow:0 0 0 2px var(--void);
  }
  .coin-pill{
    display:flex; align-items:center; gap:7px;
    background:var(--panel-2); border:1px solid var(--line);
    padding:7px 12px 7px 10px; border-radius:9px;
    font-family:'JetBrains Mono'; font-size:13px; font-weight:500;
    color:#FFD166;
    cursor:pointer;
  }
  .avatar-btn{
    width:38px; height:38px; border-radius:9px; overflow:hidden;
    background: linear-gradient(135deg, var(--violet), var(--signal));
    display:grid; place-items:center; font-family:'Space Grotesk'; font-weight:700; font-size:14px;
    color:#06110D; cursor:pointer;
  }
  .avatar-wrap{ position:relative; }
  .avatar-dropdown{
    position:absolute; top:46px; right:0; z-index:60;
    width:200px;
    background:var(--panel-2); border:1px solid var(--line); border-radius:14px;
    box-shadow:0 20px 50px rgba(0,0,0,0.45);
    opacity:0; transform:translateY(-8px); pointer-events:none;
    transition: all .18s;
  }
  .avatar-dropdown.open{ opacity:1; transform:translateY(0); pointer-events:auto; }
  .avatar-dropdown .who{ padding:14px 16px 10px; border-bottom:1px solid var(--line); }
  .avatar-dropdown .who .name{ font-family:'Space Grotesk'; font-weight:600; font-size:14px; }
  .avatar-dropdown .who .tag{ font-size:11.5px; color:var(--muted); margin-top:2px; }
  .avatar-dropdown .logout-item{
    padding:12px 16px; font-size:13px; color:var(--ember); cursor:pointer; font-weight:600;
  }
  .avatar-dropdown .logout-item:hover{ background:var(--ember-dim); }

  /* ===== Layout ===== */
  .shell{ display:flex; position:relative; z-index:1; }
  .sidebar{
    width:220px; flex-shrink:0;
    padding:20px 12px;
    display:flex; flex-direction:column; gap:2px;
    position:sticky; top:65px; height:calc(100vh - 65px);
    border-right:1px solid var(--line);
  }
  .side-link{
    display:flex; align-items:center; gap:12px;
    padding:10px 12px; border-radius:9px;
    color:var(--muted); font-size:14px; font-weight:500;
    cursor:pointer; transition: all .15s;
  }
  .side-link svg{ width:18px; height:18px; flex-shrink:0; }
  .side-link:hover{ background:var(--panel-2); color:var(--cloud); }
  .side-link.active{ background:var(--signal-dim); color:var(--signal); }
  .side-divider{ height:1px; background:var(--line); margin:12px 4px; }
  .side-label{ font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:#4C5567; padding:8px 12px 4px; font-weight:600;}

  .live-strip{
    margin-top:auto;
    background:var(--panel-2); border:1px solid var(--line); border-radius:11px;
    padding:13px;
  }
  .live-strip .dot-row{ display:flex; align-items:center; gap:7px; margin-bottom:6px;}
  .pulse{
    width:8px; height:8px; border-radius:50%; background:var(--signal);
    box-shadow:0 0 0 0 rgba(44,241,176,0.6);
    animation: pulse 1.8s infinite;
  }
  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(44,241,176,0.55); }
    70%{ box-shadow:0 0 0 8px rgba(44,241,176,0); }
    100%{ box-shadow:0 0 0 0 rgba(44,241,176,0); }
  }
  .live-strip .num{ font-family:'JetBrains Mono'; font-weight:600; font-size:15px; }
  .live-strip .cap{ font-size:11.5px; color:var(--muted); line-height:1.4; }

  main{ flex:1; padding:26px 32px 60px; min-width:0; }

  /* ===== Hero ===== */
  .hero{
    position:relative;
    border-radius:18px;
    padding:44px 40px;
    overflow:hidden;
    background:
      radial-gradient(ellipse 60% 100% at 100% 0%, rgba(140,124,255,0.25), transparent 60%),
      radial-gradient(ellipse 50% 90% at 0% 100%, rgba(44,241,176,0.2), transparent 60%),
      linear-gradient(160deg, #151A24, #0E1219);
    border:1px solid var(--line);
    margin-bottom:38px;
  }
  .hero .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    font-family:'JetBrains Mono'; font-size:11.5px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--signal); background:var(--signal-dim); border:1px solid rgba(44,241,176,0.3);
    padding:5px 11px; border-radius:100px; margin-bottom:18px;
  }
  .hero h1{
    font-family:'Space Grotesk'; font-weight:700; font-size:44px; line-height:1.08;
    max-width:640px; letter-spacing:-0.01em;
  }
  .hero h1 .accent{ color:var(--signal); }
  .hero p{ color:var(--muted); font-size:15.5px; max-width:480px; margin-top:16px; line-height:1.6;}
  .hero .cta-row{ display:flex; gap:12px; margin-top:26px; }
  .btn{
    font-family:'Inter'; font-weight:600; font-size:14.5px;
    padding:12px 22px; border-radius:10px; cursor:pointer; border:1px solid transparent;
    transition: transform .15s, box-shadow .15s;
    display:inline-block;
  }
  .btn:hover{ transform: translateY(-1px); }
  .btn-primary{ background:var(--signal); color:#06120D; box-shadow:0 8px 24px rgba(44,241,176,0.25); }
  .btn-ghost{ background:transparent; border-color:var(--line); color:var(--cloud); }
  .btn-ghost:hover{ border-color:var(--signal); }

  /* ===== Section headers ===== */
  .section{ margin-bottom:40px; }
  .section-head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:16px; }
  .section-head h2{ font-family:'Space Grotesk'; font-size:19px; font-weight:600; display:flex; align-items:center; gap:9px;}
  .section-head .tag{ font-family:'JetBrains Mono'; font-size:11px; color:var(--muted); background:var(--panel-2); padding:3px 8px; border-radius:5px; border:1px solid var(--line);}
  .see-all{ font-size:13px; color:var(--muted); font-weight:500; cursor:pointer; }
  .see-all:hover{ color:var(--signal); }

  /* ===== Game grid ===== */
  .grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap:18px;
  }
  .card{
    cursor:pointer; position:relative;
  }
  .thumb{
    aspect-ratio: 1/1;
    border-radius:14px;
    position:relative;
    overflow:hidden;
    border:1px solid var(--line);
    transition: transform .2s, border-color .2s;
    display:grid; place-items:center;
  }
  .card:hover .thumb{ transform: translateY(-4px); border-color: rgba(44,241,176,0.4); }
  .thumb::before{
    content:""; position:absolute; inset:0; opacity:0.9;
  }
  .thumb .glyph{ position:relative; z-index:1; width:38%; height:38%; opacity:0.9;}
  .thumb .rank{
    position:absolute; top:9px; left:9px; z-index:2;
    font-family:'Space Grotesk'; font-weight:700; font-size:12px;
    background:rgba(11,14,20,0.55); backdrop-filter:blur(4px);
    padding:3px 8px; border-radius:6px; color:var(--cloud);
  }
  .thumb .plays{
    position:absolute; bottom:9px; left:9px; right:9px; z-index:2;
    display:flex; align-items:center; gap:5px;
    font-family:'JetBrains Mono'; font-size:11px; color:#fff;
    background:rgba(11,14,20,0.55); backdrop-filter:blur(4px);
    padding:4px 8px; border-radius:6px;
  }
  .thumb .play-hover{
    position:absolute; inset:0; z-index:3;
    display:grid; place-items:center;
    background:rgba(8,10,15,0.35);
    opacity:0; transition:opacity .18s;
  }
  .card:hover .play-hover{ opacity:1; }
  .play-hover svg{ width:34px; height:34px; }

  .card .title{ margin-top:9px; font-size:13.5px; font-weight:600; line-height:1.3; }
  .card .sub{ font-size:11.5px; color:var(--muted); margin-top:3px; }

  /* thumbnail palettes */
  .t1::before{ background: linear-gradient(150deg,#1F3A5F,#0E1B2E); }
  .t2::before{ background: linear-gradient(150deg,#3A2A54,#160F24); }
  .t3::before{ background: linear-gradient(150deg,#3D2418,#170D08); }
  .t4::before{ background: linear-gradient(150deg,#123B33,#06120F); }
  .t5::before{ background: linear-gradient(150deg,#42324B,#150F1B); }
  .t6::before{ background: linear-gradient(150deg,#2E3D18,#10160A); }
  .t7::before{ background: linear-gradient(150deg,#452030,#170A10); }
  .t8::before{ background: linear-gradient(150deg,#1B3A4A,#08151C); }
  .t9::before{ background: linear-gradient(150deg,#3C1F45,#150A19); }
  .t10::before{ background: linear-gradient(150deg,#213E2E,#0A1712); }

  footer{
    border-top:1px solid var(--line);
    padding:36px 32px; margin-left:220px;
    color:var(--muted); font-size:12.5px;
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px;
  }

  /* ===== Disclaimer banner ===== */
  .disclaimer{
    position:relative; z-index:1;
    margin:0 32px 24px;
    padding:10px 16px;
    background:var(--panel-2); border:1px solid var(--line);
    border-radius:10px;
    font-size:12.5px; color:var(--muted);
    display:flex; align-items:center; gap:8px;
  }
  .disclaimer svg{ width:14px; height:14px; flex-shrink:0; color:var(--signal); }

  /* ===== Empty state ===== */
  .empty-state{
    border:1px dashed var(--line);
    border-radius:16px;
    padding:60px 24px;
    display:flex; flex-direction:column; align-items:center; text-align:center;
    gap:14px;
    background: var(--panel);
  }
  .empty-state .icon-wrap{
    width:56px; height:56px; border-radius:14px;
    background:var(--signal-dim); border:1px solid rgba(44,241,176,0.3);
    display:grid; place-items:center;
  }
  .empty-state .icon-wrap svg{ width:26px; height:26px; color:var(--signal); }
  .empty-state h3{ font-family:'Space Grotesk'; font-size:17px; font-weight:600; }
  .empty-state p{ color:var(--muted); font-size:13.5px; max-width:360px; line-height:1.6; }

  /* ===== Notifications dropdown ===== */
  .notif-wrap{ position:relative; }
  .notif-dropdown{
    position:absolute; top:46px; right:0; z-index:60;
    width:300px; max-height:380px; overflow-y:auto;
    background:var(--panel-2); border:1px solid var(--line); border-radius:14px;
    box-shadow:0 20px 50px rgba(0,0,0,0.45);
    opacity:0; transform:translateY(-8px); pointer-events:none;
    transition: all .18s;
  }
  .notif-dropdown.open{ opacity:1; transform:translateY(0); pointer-events:auto; }
  .notif-head{ padding:14px 16px 10px; font-family:'Space Grotesk'; font-weight:600; font-size:14px; border-bottom:1px solid var(--line); }
  .notif-item{ padding:12px 16px; border-bottom:1px solid var(--line); display:flex; gap:10px; align-items:flex-start; }
  .notif-item:last-child{ border-bottom:none; }
  .notif-dot{ width:8px; height:8px; border-radius:50%; background:var(--signal); margin-top:5px; flex-shrink:0; }
  .notif-dot.read{ background:transparent; border:1px solid var(--line); }
  .notif-text{ font-size:13px; line-height:1.5; }
  .notif-time{ font-size:11px; color:var(--muted); margin-top:3px; font-family:'JetBrains Mono'; }
  .notif-empty{ padding:24px 16px; text-align:center; color:var(--muted); font-size:13px; }

  /* ===== Friends drawer ===== */
  .drawer-overlay{
    position:fixed; inset:0; background:rgba(5,7,11,0.55); z-index:70;
    opacity:0; pointer-events:none; transition: opacity .2s;
  }
  .drawer-overlay.open{ opacity:1; pointer-events:auto; }
  .friends-drawer{
    position:fixed; top:0; right:0; bottom:0; width:320px; max-width:88vw; z-index:71;
    background:var(--panel); border-left:1px solid var(--line);
    transform:translateX(100%); transition: transform .25s ease;
    display:flex; flex-direction:column;
  }
  .friends-drawer.open{ transform:translateX(0); }
  .drawer-head{
    padding:18px 18px 14px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
  }
  .drawer-head h3{ font-family:'Space Grotesk'; font-size:17px; font-weight:600; }
  .drawer-close{ cursor:pointer; color:var(--muted); width:30px; height:30px; display:grid; place-items:center; border-radius:8px; }
  .drawer-close:hover{ background:var(--panel-2); color:var(--cloud); }
  .add-friend-row{ display:flex; gap:8px; padding:14px 18px; border-bottom:1px solid var(--line); }
  .add-friend-row input{
    flex:1; background:var(--panel-2); border:1px solid var(--line); border-radius:9px;
    padding:9px 12px; color:var(--cloud); font-size:13.5px; outline:none;
  }
  .add-friend-row input:focus{ border-color:var(--signal); }
  .add-friend-row button{
    background:var(--signal); color:#06120D; border:none; border-radius:9px;
    padding:0 16px; font-weight:600; font-size:13px; cursor:pointer; flex-shrink:0;
  }
  .friend-list{ flex:1; overflow-y:auto; padding:8px 10px; }
  .friend-item{ display:flex; align-items:center; gap:11px; padding:10px 8px; border-radius:10px; }
  .friend-item:hover{ background:var(--panel-2); }
  .friend-avatar{
    width:38px; height:38px; border-radius:10px; flex-shrink:0; position:relative;
    background:linear-gradient(135deg, var(--violet), var(--signal));
    display:grid; place-items:center; font-family:'Space Grotesk'; font-weight:700; font-size:14px; color:#06110D;
  }
  .status-dot{
    position:absolute; bottom:-2px; right:-2px; width:11px; height:11px; border-radius:50%;
    border:2px solid var(--panel);
  }
  .status-dot.online{ background:var(--signal); }
  .status-dot.offline{ background:#4A5364; }
  .friend-name{ font-size:13.5px; font-weight:600; }
  .friend-status{ font-size:11.5px; color:var(--muted); }
  .friend-remove{ margin-left:auto; color:var(--muted); cursor:pointer; width:26px; height:26px; display:grid; place-items:center; border-radius:7px; flex-shrink:0; }
  .friend-remove:hover{ background:var(--ember-dim); color:var(--ember); }

  /* ===== Leaderboard drawer ===== */
  .lb-list{ flex:1; overflow-y:auto; padding:8px 10px; }
  .lb-empty{ padding:30px 18px; text-align:center; color:var(--muted); font-size:13px; line-height:1.6; }
  .lb-row{ display:flex; align-items:center; gap:11px; padding:10px 8px; border-radius:10px; }
  .lb-row:hover{ background:var(--panel-2); }
  .lb-row.me{ background:var(--signal-dim); }
  .lb-rank{
    width:26px; flex-shrink:0; text-align:center;
    font-family:'JetBrains Mono'; font-weight:700; font-size:13px; color:var(--muted);
  }
  .lb-rank.top1{ color:#FFD166; font-size:17px; }
  .lb-rank.top2{ color:#C9D2E0; font-size:16px; }
  .lb-rank.top3{ color:#E0A468; font-size:16px; }
  .lb-avatar{
    width:36px; height:36px; border-radius:10px; flex-shrink:0;
    background:linear-gradient(135deg, var(--violet), var(--signal));
    display:grid; place-items:center; font-family:'Space Grotesk'; font-weight:700; font-size:13.5px; color:#06110D;
  }
  .lb-name{ font-size:13.5px; font-weight:600; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lb-you-tag{ font-size:10px; color:var(--signal); font-weight:700; margin-left:6px; }
  .lb-coins{
    display:flex; align-items:center; gap:5px; flex-shrink:0;
    font-family:'JetBrains Mono'; font-weight:600; font-size:12.5px; color:#FFD166;
  }

  /* ===== Chat panel ===== */
  .chat-overlay{
    position:fixed; inset:0; z-index:80;
    background:rgba(5,7,11,0.55);
    opacity:0; pointer-events:none; transition: opacity .2s;
  }
  .chat-overlay.open{ opacity:1; pointer-events:auto; }
  .chat-panel{
    position:fixed; top:0; right:0; bottom:0; width:340px; max-width:92vw; z-index:81;
    background:var(--panel); border-left:1px solid var(--line);
    transform:translateX(100%); transition: transform .25s ease;
    display:flex; flex-direction:column;
  }
  .chat-panel.open{ transform:translateX(0); }
  .chat-head{
    padding:14px 16px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:11px; flex-shrink:0;
  }
  .chat-head .friend-avatar{ width:36px; height:36px; }
  .chat-head-info .name{ font-family:'Space Grotesk'; font-weight:600; font-size:14px; }
  .chat-head-info .status{ font-size:11.5px; color:var(--muted); }
  .chat-back{ margin-left:auto; cursor:pointer; color:var(--muted); width:30px; height:30px; d
